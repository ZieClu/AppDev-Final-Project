<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home · BookMarked</title>

<!-- Bootstrap 5 -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts: Fraunces for display, Inter for body/UI — same pairing as login/signup -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="bookmarked-style.css">
</head>
<body>

<!-- HEADER -->
<header class="bm-header">
  <!-- <span class="bm-logo-mark">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 5.5C3 5.5 5.5 4 8.5 4C10.2 4 11.3 4.6 12 5.2C12.7 4.6 13.8 4 15.5 4C18.5 4 21 5.5 21 5.5V17.5C21 17.5 18.5 16.5 15.5 16.5C13.8 16.5 12.7 17.1 12 17.7C11.3 17.1 10.2 16.5 8.5 16.5C5.5 16.5 3 17.5 3 17.5V5.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M12 5.2V17.7" stroke="currentColor" stroke-width="1.4"/>
    </svg>
  </span> -->
  <a href="home.html" class="bm-wordmark" id="homeLogoLink">🕮 BookMarked<span class="dot">.</span></a>
</header>

<!-- TOOLBAR -->
<div class="bm-toolbar">
  <button class="bm-filters-toggle" id="filtersToggleBtn" aria-expanded="false" aria-controls="filtersPanel">
    <span class="caret">&#9660;</span> Filters
  </button>

  <form id="searchForm" class="d-flex flex-grow-1 gap-3" role="search">
    <input
      type="search"
      class="bm-search-input"
      id="searchInput"
      name="q"
      placeholder="Search by title, author, or username&hellip;"
      aria-label="Search books"
    >
    <button type="submit" class="bm-search-btn">Search</button>
  </form>

  <!-- Genres dropdown -->
  <div class="bm-filters-panel" id="filtersPanel">
    <h3>Genres</h3>
    <hr>
    <div class="row" id="genreCheckboxList">
      <!-- populated by JS from the GENRES list below -->
    </div>
    <div class="bm-filters-panel-foot">
      <button type="button" class="bm-collapse-btn" id="collapseFiltersBtn" aria-label="Collapse filters">&#9650;</button>
      <button type="button" class="bm-apply-btn" id="applyFiltersBtn">Apply</button>
    </div>
  </div>
</div>

<!-- LAYOUT -->
<div class="bm-layout">

  <!-- Sidebar -->
  <aside class="bm-sidebar">
    <div class="bm-avatar">
      <!-- BACKEND HOOK: replace with the user's profile photo, e.g.
           <img src="{{user.avatarUrl}}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"> -->
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4.5 19.5C5.5 16 8.2 14.5 12 14.5C15.8 14.5 18.5 16 19.5 19.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <!-- BACKEND HOOK: replace static "User" text with the logged-in user's display name -->
    <div class="bm-username" id="sidebarUsername">User</div>
    <div class="bm-sidebar-rule"></div>

    <ul class="bm-nav">
      <li><a href="account.html"><span class="spark">&#10022;</span> My Account</a></li>
      <li><a href="library.html"><span class="spark">&#10022;</span> My Library</a></li>
      <li><a href="listings.html"><span class="spark">&#10022;</span> My Listings</a></li>
    </ul>
  </aside>

  <!-- Main content -->
  <main class="bm-content">

    <!-- Default heading: shown when no filter/search is active -->
    <div class="bm-section-pill" id="recentArrivalsHeading">
      <h2><span class="spark" style="color: var(--ink);">&#10022;</span> Recent Arrivals:</h2>
    </div>

    <!-- Applied-filters / search-result heading: hidden by default -->
    <div class="bm-section-pill is-applied d-none" id="appliedHeading">
      <h2><span class="spark">&#10022;</span> Filters Applied:</h2>
      <div id="appliedChips" class="d-flex gap-2 flex-wrap"></div>
    </div>
    <p class="bm-search-note d-none" id="searchNote"></p>

    <!-- Book grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="bookGrid">
      <!-- populated by JS from the BOOKS list below -->
    </div>

    <p class="bm-empty-state d-none" id="emptyState">No books match those filters yet — try another genre or search term.</p>

    <!--
      BACKEND HOOK: this divider is a placeholder for pagination / "load more".
      Wire its click handler to fetch the next page from your API and append
      results to #bookGrid, or replace it with real Bootstrap pagination.
    -->
    <button type="button" class="bm-divider" id="loadMoreBtn" aria-label="Load more listings"></button>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
/* Placeholder data & demo interactivity.
   Everything below stands in for real API calls — the shapes (BOOKS,
   GENRES) are a reasonable contract to hand to a backend dev:
     GET /api/books?recent=true
     GET /api/books?genres=horror,fantasy
     GET /api/books?q=little+prince
   Swap the fetch-free logic in place of the BACKEND HOOK comments below. */

const GENRES = [
  "Fantasy", "Mystery", "Romance", "Adventure",
  "Historical", "Action", "Horror", "Non-fiction",
  "Philosophical", "Dystopian"
];

const BOOKS = [
  { id: 1,  title: "House of Leaves",              author: "Mark Z. Danielewski", price: 250, user: "UserName1", genres: ["Horror", "Philosophical"], cover: "cover-1" },
  { id: 2,  title: "Madonna in a Fur Coat",         author: "Sabahattin Ali",      price: 300, user: "UserName2", genres: ["Romance", "Historical"],   cover: "cover-2" },
  { id: 3,  title: "The Great Gatsby",              author: "F. Scott Fitzgerald", price: 150, user: "UserName3", genres: ["Historical", "Romance"],   cover: "cover-3" },
  { id: 4,  title: "East of Eden",                  author: "John Steinbeck",     price: 250, user: "UserName4", genres: ["Historical", "Philosophical"], cover: "cover-4" },
  { id: 5,  title: "Percy Jackson: The Lightning Thief", author: "Rick Riordan",  price: 400, user: "UserName5", genres: ["Fantasy", "Adventure"],    cover: "cover-5" },
  { id: 6,  title: "The Island of Missing Trees",   author: "Elif Shafak",        price: 199, user: "UserName6", genres: ["Historical", "Romance"],   cover: "cover-6" },
  { id: 7,  title: "Pet Sematary",                  author: "Stephen King",       price: 600, user: "UserName7", genres: ["Horror"],                  cover: "cover-7" },
  { id: 8,  title: "The Unbearable Lightness of Being", author: "Milan Kundera",  price: 200, user: "UserName8", genres: ["Philosophical", "Romance"], cover: "cover-8" },
  { id: 9,  title: "Frankenstein",                  author: "Mary Wollstonecraft Shelley", price: 270, user: "UserName1", genres: ["Horror", "Fantasy"], cover: "cover-9" },
  { id: 10, title: "The Haunting of Hill House",    author: "Shirley Jackson",    price: 300, user: "UserName2", genres: ["Horror", "Mystery"],       cover: "cover-10" },
  { id: 11, title: "The Call of Cthulhu",           author: "H. P. Lovecraft",    price: 400, user: "UserName3", genres: ["Horror", "Fantasy"],       cover: "cover-11" },
  { id: 12, title: "Dracula",                       author: "Bram Stoker",        price: 350, user: "UserName4", genres: ["Horror", "Fantasy"],       cover: "cover-12" },
  { id: 13, title: "IT",                            author: "Stephen King",       price: 450, user: "UserName5", genres: ["Horror"],                  cover: "cover-13" },
  { id: 14, title: "Scary Stories to Tell in the Dark", author: "Alvin Schwartz", price: 220, user: "UserName6", genres: ["Horror"],                  cover: "cover-14" },
  { id: 15, title: "The Little Prince",             author: "Antoine de Saint-Exup\u00e9ry, illus. Chris Riddell", price: 300, user: "UserName1", genres: ["Fantasy", "Philosophical"], cover: "cover-15" },
  { id: 16, title: "The Little Prince",             author: "Antoine de Saint-Exup\u00e9ry", price: 350, user: "UserName2", genres: ["Fantasy", "Philosophical"], cover: "cover-16" }
];

const RECENT_ARRIVALS_IDS = [1, 2, 3, 4, 5, 6, 7, 8];

/* render helpers */

const cartIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 4H5L7.5 15H18L20.5 7H6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="19" r="1.3" fill="currentColor"/><circle cx="17" cy="19" r="1.3" fill="currentColor"/></svg>';

const userIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 19.5C5.5 16 8.2 14.5 12 14.5C15.8 14.5 18.5 16 19.5 19.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';

function bookCardHTML(book) {
  // BACKEND HOOK: swap the .book-cover placeholder for a real cover image, e.g.
  // <img src="${book.coverUrl}" alt="${book.title} cover" class="book-cover-img">
  return `
    <div class="col">
      <div class="book-card" data-id="${book.id}">
        <div class="book-cover ${book.cover}">
          <span class="book-cover-title">${book.title}</span>
          <span class="book-cover-author">${book.author}</span>
        </div>
        <div class="book-price">Php ${book.price}</div>
        <a href="#" class="book-purchase" data-book-id="${book.id}">${cartIcon} Purchase</a>
        <div class="book-user">${userIcon} ${book.user}</div>
      </div>
    </div>
  `;
}

function renderBooks(list) {
  const grid = document.getElementById('bookGrid');
  const empty = document.getElementById('emptyState');
  if (!list.length) {
    grid.innerHTML = '';
    empty.classList.remove('d-none');
    return;
  }
  empty.classList.add('d-none');
  grid.innerHTML = list.map(bookCardHTML).join('');
}

function showDefaultView() {
  document.getElementById('recentArrivalsHeading').classList.remove('d-none');
  document.getElementById('appliedHeading').classList.add('d-none');
  document.getElementById('searchNote').classList.add('d-none');
  const arrivals = RECENT_ARRIVALS_IDS.map(id => BOOKS.find(b => b.id === id));
  renderBooks(arrivals);
}

function showFilteredView(selectedGenres) {
  document.getElementById('recentArrivalsHeading').classList.add('d-none');
  document.getElementById('searchNote').classList.add('d-none');
  const appliedHeading = document.getElementById('appliedHeading');
  appliedHeading.classList.remove('d-none');

  const chipsWrap = document.getElementById('appliedChips');
  chipsWrap.innerHTML = selectedGenres.map(g =>
    `<span class="bm-chip" data-genre="${g}">${g} <span class="remove" data-remove-genre="${g}">&times;</span></span>`
  ).join('');

  const results = selectedGenres.length
    ? BOOKS.filter(b => b.genres.some(g => selectedGenres.includes(g)))
    : BOOKS;
  renderBooks(results);
}

function showSearchView(query) {
  document.getElementById('recentArrivalsHeading').classList.add('d-none');
  document.getElementById('appliedHeading').classList.remove('d-none');
  document.getElementById('appliedChips').innerHTML = '';

  const note = document.getElementById('searchNote');
  note.classList.remove('d-none');
  note.textContent = `Search results for \u201c${query}\u201d`;

  // BACKEND HOOK: replace this client-side filter with a real API call, e.g.
  // fetch(`/api/books?q=${encodeURIComponent(query)}`).then(...)
  const q = query.trim().toLowerCase();
  const results = BOOKS.filter(b =>
    b.title.toLowerCase().includes(q) ||
    b.author.toLowerCase().includes(q) ||
    b.user.toLowerCase().includes(q)
  );
  renderBooks(results);
}

/* genre checkboxes */

function buildGenreCheckboxes() {
  const wrap = document.getElementById('genreCheckboxList');
  wrap.innerHTML = GENRES.map(g => `
    <div class="col-6">
      <label class="bm-genre-check">
        <input type="checkbox" value="${g}" class="genre-checkbox">
        ${g}
      </label>
    </div>
  `).join('');
}

/* wire up interactions */

document.addEventListener('DOMContentLoaded', function () {
  buildGenreCheckboxes();
  showDefaultView();

  const filtersToggleBtn = document.getElementById('filtersToggleBtn');
  const filtersPanel = document.getElementById('filtersPanel');
  const collapseFiltersBtn = document.getElementById('collapseFiltersBtn');
  const applyFiltersBtn = document.getElementById('applyFiltersBtn');
  const searchForm = document.getElementById('searchForm');
  const searchInput = document.getElementById('searchInput');
  const homeLogoLink = document.getElementById('homeLogoLink');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  function toggleFiltersPanel(forceOpen) {
    const willOpen = forceOpen !== undefined ? forceOpen : !filtersPanel.classList.contains('open');
    filtersPanel.classList.toggle('open', willOpen);
    filtersToggleBtn.setAttribute('aria-expanded', String(willOpen));
  }

  filtersToggleBtn.addEventListener('click', () => toggleFiltersPanel());
  collapseFiltersBtn.addEventListener('click', () => toggleFiltersPanel(false));

  applyFiltersBtn.addEventListener('click', function () {
    const selected = Array.from(document.querySelectorAll('.genre-checkbox:checked')).map(cb => cb.value);
    toggleFiltersPanel(false);
    searchInput.value = '';
    // BACKEND HOOK: fetch('/api/books?genres=' + selected.join(',')).then(...)
    showFilteredView(selected);
  });

  // Remove an individual filter chip without reopening the panel
  document.getElementById('appliedChips').addEventListener('click', function (e) {
    const genre = e.target.getAttribute('data-remove-genre');
    if (!genre) return;
    const checkbox = document.querySelector(`.genre-checkbox[value="${genre}"]`);
    if (checkbox) checkbox.checked = false;
    const remaining = Array.from(document.querySelectorAll('.genre-checkbox:checked')).map(cb => cb.value);
    if (remaining.length) {
      showFilteredView(remaining);
    } else {
      showDefaultView();
    }
  });

  searchForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const query = searchInput.value.trim();
    if (!query) {
      showDefaultView();
      return;
    }
    document.querySelectorAll('.genre-checkbox').forEach(cb => (cb.checked = false));
    toggleFiltersPanel(false);
    showSearchView(query);
  });

  // Clicking the logo resets to the default "Recent Arrivals" view
  homeLogoLink.addEventListener('click', function (e) {
    e.preventDefault();
    searchInput.value = '';
    document.querySelectorAll('.genre-checkbox').forEach(cb => (cb.checked = false));
    toggleFiltersPanel(false);
    showDefaultView();
  });

  // Purchase links: intentionally inert placeholders for now
  document.getElementById('bookGrid').addEventListener('click', function (e) {
    const link = e.target.closest('.book-purchase');
    if (!link) return;
    e.preventDefault();
    // BACKEND HOOK: POST /api/orders with { bookId: link.dataset.bookId }
    console.log('Purchase clicked for book id', link.dataset.bookId, '— wire up checkout flow.');
  });

  loadMoreBtn.addEventListener('click', function () {
    // BACKEND HOOK: fetch the next page of results and append to #bookGrid
    console.log('Load more clicked — wire up pagination.');
  });
});
</script>
</body>
</html>
