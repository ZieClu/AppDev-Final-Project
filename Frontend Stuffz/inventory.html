<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Listings · BookMarked</title>

<!-- Bootstrap 5 -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts: Fraunces for display, Inter for body/UI — same pairing as the rest of the site -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="bookmarked-style.css">

<style>
  /* --- Inventory / "User's Store" page — extends bookmarked-style.css tokens --- */

  .inv-content {
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 2.75rem 2.5rem 4rem;
  }

  .inv-header-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.75rem;
  }

  .inv-avatar {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    background: var(--cream-50);
    border: 4px solid var(--teal-900);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--teal-900);
  }

  .inv-title {
    font-family: var(--font-display);
    font-size: 3rem;
    color: var(--teal-900);
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin: 0;
  }

  .inv-title .spark {
    color: var(--teal-800);
    font-size: 2.1rem;
  }

  .inv-meta-row {
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
    padding-bottom: 1.1rem;
    border-bottom: 3px solid var(--teal-900);
    margin-bottom: 2.25rem;
  }

  .inv-earnings-pill {
    background: var(--sage-300);
    border-radius: 999px;
    padding: 0.6rem 1.4rem;
    font-weight: 700;
    color: var(--ink);
    font-size: 1.02rem;
  }

  .inv-link {
    color: var(--teal-900);
    font-weight: 600;
    font-size: 1.05rem;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .inv-link:hover { color: var(--teal-800); }

  .inv-back-link { margin-left: auto; }

  /* listing card — built on top of the existing .book-card / .book-cover system */
  .inv-listing-title {
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.3rem;
    line-height: 1.25;
  }

  .inv-listing-actions {
    display: flex;
    gap: 1.4rem;
    margin-top: 0.2rem;
  }

  .inv-action-link {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: var(--teal-900);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
    font-size: 0.95rem;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  .inv-action-link:hover { color: var(--teal-800); }

  .inv-action-link.danger { color: var(--danger); }
  .inv-action-link.danger:hover { color: #8a3623; }

  /* "Add Listing" tile — same footprint as a book cover */
  .inv-add-card {
    aspect-ratio: 3 / 4.3;
    border: 2.5px dashed var(--teal-900);
    border-radius: var(--radius-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    text-align: center;
    color: var(--teal-900);
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 600;
    background: #ffffff22;
    transition: background 0.15s ease, transform 0.15s ease;
    cursor: pointer;
    margin-bottom: 0.75rem;
  }

  .inv-add-card:hover {
    background: #ffffff40;
    transform: translateY(-4px);
  }

  .inv-add-card .plus {
    font-size: 2.4rem;
    line-height: 1;
  }

  .inv-empty-state {
    color: var(--ink-soft);
    font-style: italic;
    padding: 2rem 0;
  }

  @media (max-width: 576px) {
    .inv-content { padding: 2rem 1.25rem 3rem; }
    .inv-title { font-size: 2.1rem; }
    .inv-avatar { width: 88px; height: 88px; }
    .inv-back-link { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- HEADER (shared across the site) -->
<header class="bm-header">
  <a href="home.html" class="bm-wordmark" id="homeLogoLink">🕮 BookMarked<span class="dot">.</span></a>
</header>

<!-- MAIN: User's Store / My Listings -->
<main class="inv-content">

  <div class="inv-header-row">
    <!-- BACKEND HOOK: replace with the user's profile photo, e.g.
         <img src="{{user.avatarUrl}}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"> -->
    <div class="inv-avatar">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4.5 19.5C5.5 16 8.2 14.5 12 14.5C15.8 14.5 18.5 16 19.5 19.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <!-- BACKEND HOOK: swap "User's Store" for "{{user.displayName}}'s Store" -->
    <h1 class="inv-title" id="storeTitle">User&rsquo;s Store <span class="spark">&#10022;</span></h1>
  </div>

  <div class="inv-meta-row">
    <!-- BACKEND HOOK: GET /api/users/me/earnings -->
    <span class="inv-earnings-pill" id="earningsPill">Earnings: Php 900.00</span>
    <a href="transactions.html" class="inv-link">Transaction History</a>
    <a href="account.html" class="inv-link inv-back-link">Back</a>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="listingsGrid">
    <!-- populated by JS from the LISTINGS list below -->
  </div>

  <p class="inv-empty-state d-none" id="emptyState">You don&rsquo;t have any listings yet — add your first book above.</p>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
/* Placeholder data & demo interactivity — stands in for real API calls.
     GET  /api/users/me/listings
     POST /api/listings                (Add Listing)
     PUT  /api/listings/:id            (Edit)
     DELETE /api/listings/:id          (Delete)
   Swap the fetch-free logic in place of the BACKEND HOOK comments below. */

let LISTINGS = [
  { id: 15, title: "The Little Prince",             author: "Antoine de Saint-Exup\u00e9ry, illus. Chris Riddell", price: 300, cover: "cover-15" },
  { id: 2,  title: "Madonna in a Fur Coat",         author: "Sabahattin Ali",      price: 150, cover: "cover-2" },
  { id: 3,  title: "The Great Gatsby",              author: "F. Scott Fitzgerald", price: 200, cover: "cover-3" },
  { id: 5,  title: "Percy Jackson: The Lightning Thief", author: "Rick Riordan",  price: 500, cover: "cover-5" },
  { id: 8,  title: "The Unbearable Lightness of Being", author: "Milan Kundera",  price: 200, cover: "cover-8" },
  { id: 1,  title: "House of Leaves",               author: "Mark Z. Danielewski", price: 600, cover: "cover-1" }
];

function listingCardHTML(book) {
  // BACKEND HOOK: swap the .book-cover placeholder for a real cover image, e.g.
  // <img src="${book.coverUrl}" alt="${book.title} cover" class="book-cover-img">
  return `
    <div class="col">
      <div class="book-card" data-id="${book.id}">
        <div class="book-cover ${book.cover}">
          <span class="book-cover-title">${book.title}</span>
          <span class="book-cover-author">${book.author}</span>
        </div>
        <div class="book-price">Php ${book.price}</div>
        <div class="inv-listing-title">${book.title}</div>
        <div class="inv-listing-actions">
          <button type="button" class="inv-action-link" data-edit-id="${book.id}">&#9998; Edit</button>
          <button type="button" class="inv-action-link danger" data-delete-id="${book.id}">&#128465; Delete</button>
        </div>
      </div>
    </div>
  `;
}

const addListingCardHTML = `
  <div class="col">
    <a href="#" class="inv-add-card" id="addListingBtn">
      <span class="plus">+</span>
      <span>Add Listing</span>
    </a>
  </div>
`;

function renderListings() {
  const grid = document.getElementById('listingsGrid');
  const empty = document.getElementById('emptyState');

  if (!LISTINGS.length) {
    empty.classList.remove('d-none');
  } else {
    empty.classList.add('d-none');
  }

  grid.innerHTML = LISTINGS.map(listingCardHTML).join('') + addListingCardHTML;
}

document.addEventListener('DOMContentLoaded', function () {
  renderListings();

  const grid = document.getElementById('listingsGrid');

  grid.addEventListener('click', function (e) {
    const addBtn = e.target.closest('#addListingBtn');
    if (addBtn) {
      e.preventDefault();
      // BACKEND HOOK: navigate to / open the "add listing" form, e.g.
      // window.location.href = 'add-listing.html';
      console.log('Add Listing clicked — wire up the create-listing flow.');
      return;
    }

    const editBtn = e.target.closest('[data-edit-id]');
    if (editBtn) {
      // BACKEND HOOK: navigate to / open the "edit listing" form for this id, e.g.
      // window.location.href = `edit-listing.html?id=${editBtn.dataset.editId}`;
      console.log('Edit clicked for listing id', editBtn.dataset.editId, '— wire up the edit flow.');
      return;
    }

    const deleteBtn = e.target.closest('[data-delete-id]');
    if (deleteBtn) {
      const id = Number(deleteBtn.dataset.deleteId);
      const listing = LISTINGS.find(b => b.id === id);
      if (listing && confirm(`Remove "${listing.title}" from your store?`)) {
        // BACKEND HOOK: fetch(`/api/listings/${id}`, { method: 'DELETE' }).then(...)
        LISTINGS = LISTINGS.filter(b => b.id !== id);
        renderListings();
      }
    }
  });
});
</script>
</body>
</html>
